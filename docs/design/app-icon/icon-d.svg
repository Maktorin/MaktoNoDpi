<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E293B"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="229" fill="url(#bgD)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="229" fill="#FFFFFF" opacity="0.04"/>
  <!-- barrier the signal passes through -->
  <rect x="496" y="232" width="32" height="560" rx="16" fill="#475569"/>
  <!-- signal arcs emanating from a source on the left, amber = getting through -->
  <g fill="none" stroke-linecap="round">
    <circle cx="360" cy="512" r="36" fill="#F59E0B" stroke="none"/>
    <path d="M438 420 A 130 130 0 0 1 438 604" stroke="#F59E0B" stroke-width="34" opacity="0.95"/>
    <path d="M438 350 A 210 210 0 0 1 438 674" stroke="#F59E0B" stroke-width="34" opacity="0.6"/>
    <!-- arc re-emerging on the right side past the barrier -->
    <path d="M586 420 A 130 130 0 0 0 586 604" stroke="#F8FAFC" stroke-width="34" opacity="0.95"/>
    <path d="M586 350 A 210 210 0 0 0 586 674" stroke="#F8FAFC" stroke-width="34" opacity="0.55"/>
  </g>
</svg>
