name: MaktoNoDpi
options:
  bundleIdPrefix: com.makto.nodpi
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

packages:
  MaktoNoDpiCore:
    path: ../Core
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0

targets:
  MaktoNoDpi:
    type: application
    platform: macOS
    sources:
      - path: MaktoNoDpi
        excludes:
          - "Resources/bin/**"
      - path: MaktoNoDpi/Resources/bin
        type: folder
        buildPhase: resources
    dependencies:
      - package: MaktoNoDpiCore
        product: MaktoNoDpiCore
      - package: Sparkle
        product: Sparkle
    info:
      path: MaktoNoDpi/Info.plist
      properties:
        CFBundleDisplayName: MaktoNoDpi
        LSMinimumSystemVersion: "13.0"
        NSHumanReadableCopyright: "MIT"
        LSUIElement: true
        SUFeedURL: "https://github.com/Maktorin/maktonodpi/releases/latest/download/appcast.xml"
        SUEnableInstallerLauncherService: true
        SUPublicEDKey: ""
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.makto.nodpi
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: NO
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: NO
